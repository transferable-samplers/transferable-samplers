# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/AAAAAA
  - override /trainer: gpu

model:
  source_energy_config:
    _target_: transferable_samplers.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 10_000
    energy_batch_size: 10_000
    grad_batch_size: 10_000
    use_com_adjustment: true
  net:
    channels: 384
    img_size: 189
    num_blocks: 6
    layers_per_block: 6

callbacks:
  sampling_evaluation:
    sampler:
      _target_: transferable_samplers.samplers.snis_sampler.SNISSampler
      num_samples: 10_000

data:
  batch_size: 512
  com_augmentation: True
  num_eval_samples: 10_000

trainer:
  check_val_every_n_epoch: 50
  max_epochs: 1000
  num_sanity_val_steps: 0
