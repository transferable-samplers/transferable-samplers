# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/GYDPETGTWG
  - override /trainer: gpu

model:
  net:
    channels: 512
    img_size: 414
    num_blocks: 8
    layers_per_block: 8

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.snis_sampler.SNISSampler
      num_samples: 10_000
      proposal_batch_size: 10_000
      use_com_adjustment: true

data:
  batch_size: 512
  com_augmentation: True
  num_eval_samples: 10_000

trainer:
  check_val_every_n_epoch: 50
  max_epochs: 1000
  num_sanity_val_steps: 0
