# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: prose
  - override /data: transferable/up_to_4aa
  - override /trainer: gpu

model:
  source_energy_config:
    _target_: src.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 5_000
    energy_batch_size: 5_000
    grad_batch_size: 5_000
    use_com_adjustment: true

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.snis_sampler.SNISSampler
      num_samples: 5_000

data:
  batch_size: 512
  num_eval_samples: 5_000
  com_augmentation: True

trainer:
  check_val_every_n_epoch: 50
  limit_train_batches: 1000
  limit_val_batches: 1
  limit_test_batches: 1
  max_epochs: 500
  num_sanity_val_steps: 0
