# @package _global_

defaults:
  - override /model: flow_matching
  - override /data: transferable/up_to_4aa
  - override /trainer: gpu

hf_state_dict_path: transferable/ecnf++_up_to_4aa.pth

model:
  source_energy_config:
    _target_: transferable_samplers.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 4
    energy_batch_size: 4
    grad_batch_size: 4
  net:
    channels: 256
    num_layers: 9
    num_aa_max: ${data.num_aa_max}
    num_aa_min: ${data.num_aa_min}

callbacks:
  sampling_evaluation:
    sampler:
      _target_: transferable_samplers.samplers.snis_sampler.SNISSampler
      num_samples: 10_000

      logw_quantile_filter: 0.002

data:
  batch_size: 128
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

