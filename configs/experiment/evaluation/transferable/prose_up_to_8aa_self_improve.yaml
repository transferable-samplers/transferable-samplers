# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: prose
  - override /data: transferable/up_to_8aa
  - override /trainer: gpu

init_hf_state_dict_path: transferable/prose_up_to_8aa.pth

model:
  use_distill_loss: True
  distill_weight: 0.5
  train_from_buffer: true

  sampler:
    _target_: src.models.samplers.snis_sampler.SNISSampler
    num_samples: 200_000
    proposal_batch_size: 2_500
    use_com_adjustment: true
    logit_clip_filter: 0.002

  optimizer:
    lr: 5.e-6

callbacks:
  ema: null
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.snis_sampler.SNISSampler
      num_samples: 10_000
      proposal_batch_size: 2_500
      use_com_adjustment: true
      logit_clip_filter: 0.002

data:
  batch_size: 32
  num_eval_samples: 10_000
  train_from_buffer: true

trainer:
  limit_train_batches: 1000
  accumulate_grad_batches: 8
  max_epochs: 4
  limit_test_batches: 1
  limit_val_batches: 1
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 100 # larger than number of epochs to self-refine
