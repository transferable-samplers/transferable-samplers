# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: prose
  - override /data: transferable/up_to_8aa
  - override /trainer: gpu

state_dict_hf_path: transferable/prose_up_to_8aa.pth

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.smc_sampler.SMCSampler
      num_samples: 10_000
      proposal_batch_size: 2_500
      kernel_type: ula
      langevin_eps: 1e-7
      num_annealing_steps: 100
      ess_threshold: 1
      systematic_resampling: true
      warmup: 0.0
      gradient_batch_size: 32
      input_energy_filter_cutoff: 100
      use_com_adjustment: true
      logit_clip_filter: 0.002
      do_energy_plots: true
      log_freq: 1

data:
  batch_size: 128
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1
