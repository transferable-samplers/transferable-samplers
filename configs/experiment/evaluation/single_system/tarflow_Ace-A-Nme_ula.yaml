# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/Ace-A-Nme
  - override /trainer: gpu

model:
  source_energy_config:
    _target_: transferable_samplers.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 10_000
    energy_batch_size: 10_000
    grad_batch_size: 10_000
  net:
    in_channels: 1
    img_size: 66
    num_blocks: 4
    layers_per_block: 4

callbacks:
  sampling_evaluation:
    sampler:
      _target_: transferable_samplers.samplers.smc_sampler.SMCSampler
      num_samples: 10_000

      init_eps: 1e-5
      num_annealing_steps: 100
      ess_threshold: 0.5
      resampling_method: multinomial
      energy_cutoff_filter: 10.0
      log_traj_freq: 1

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

hf_state_dict_path: single_system/tarflow_Ace-A-Nme_0.pth
