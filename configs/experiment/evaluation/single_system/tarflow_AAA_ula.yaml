# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/AAA
  - override /trainer: gpu

model:
  net:
    img_size: 99
    num_blocks: 6
    layers_per_block: 6

  sampler:
    _target_: src.models.samplers.smc_sampler.SMCSampler
    num_samples: 10_000
    proposal_batch_size: 10_000
    kernel_type: ula
    langevin_eps: 1e-7
    num_timesteps: 100
    ess_threshold: 0.5
    systematic_resampling: false
    warmup: 0.0
    gradient_batch_size: 128
    input_energy_filter_cutoff: -120.0
    use_com_adjustment: true
    logit_clip_filter: 0.002
    do_energy_plots: true
    log_freq: 1

  ema_decay: 0.0

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

state_dict_hf_path: single_system/tarflow_AAA_0.pth