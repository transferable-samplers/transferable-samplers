# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/AAAAAA
  - override /trainer: gpu

model:
  source_energy_config:
    _target_: src.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 10_000
    energy_batch_size: 10_000
    grad_batch_size: 10_000
  net:
    channels: 384
    img_size: 189
    num_blocks: 6
    layers_per_block: 6

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.smc_sampler.SMCSampler
      num_samples: 10_000

      init_eps: 1e-6
      num_annealing_steps: 100
      ess_threshold: 0.5
      resampling_method: multinomial
      energy_cutoff_filter: -20.0
      log_traj_freq: 1

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

hf_state_dict_path: single_system/tarflow_AAAAAA_0.pth
