# @package _global_

defaults:
  - override /model: flow_matching++
  - override /model/net: egnn_dynamics_ad2_cat
  - override /data: single_system/Ace-A-Nme
  - override /trainer: gpu

hf_state_dict_path: single_system/ecnf++_Ace-A-Nme_0.pth

model:
  source_energy_config:
    _target_: src.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 8
    energy_batch_size: 8
    grad_batch_size: 8
  net:
    channels: 256
    num_layers: 5

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.samplers.snis_sampler.SNISSampler
      num_samples: 10_000


data:
  batch_size: 128
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1


