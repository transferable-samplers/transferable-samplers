# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/GYDPETGTWG
  - override /trainer: gpu

model:
  net:
    channels: 384
    img_size: 414
    num_blocks: 8
    layers_per_block: 8

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.smc_sampler.SMCSampler
      num_samples: 10_000
      proposal_batch_size: 10_000
      kernel_type: ula
      langevin_eps: 2e-8
      num_annealing_steps: 500
      ess_threshold: 0.5
      systematic_resampling: false
      warmup: 0.0
      gradient_batch_size: 128
      input_energy_filter_cutoff: -300
      use_com_adjustment: true
      logit_clip_filter: 0.002
      do_energy_plots: true
      log_freq: 1

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

state_dict_hf_path: single_system/tarflow_GYDPETGTWG_0.pth
