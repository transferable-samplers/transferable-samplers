# @package _global_

defaults:
  - override /model: normalizing_flow
  - override /model/net: tarflow_single_system
  - override /data: single_system/GYDPETGTWG
  - override /trainer: gpu

model:
  source_energy_config:
    _target_: src.utils.dataclasses.SourceEnergyConfig
    sample_batch_size: 10_000
    energy_batch_size: 10_000
    grad_batch_size: 10_000
  net:
    channels: 384
    img_size: 414
    num_blocks: 8
    layers_per_block: 8

callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.models.samplers.smc_sampler.SMCSampler
      num_samples: 10_000

      init_sigma: 4.5e-3 # ≈ sqrt(2 * 2e-8 * 500) (conversion of old langevin_eps parameter)
      num_annealing_steps: 500
      ess_threshold: 0.5
      resampling_method: multinomial
      energy_cutoff_filter: -300
      log_traj_freq: 1

data:
  batch_size: 10_000
  num_eval_samples: 10_000

trainer:
  limit_test_batches: 1
  limit_val_batches: 1

hf_state_dict_path: single_system/tarflow_GYDPETGTWG_0.pth
