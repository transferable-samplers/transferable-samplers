# @package _global_
# ──────────────────────────────────────────────────────────────
# Description: Evaluate Prose on ManyPeptidesMD with MALA (SMC Discrete)
# Reference:   Table 4, Amortized Sampling with Transferable Normalizing Flows
#              https://arxiv.org/abs/2508.18175
# Notes:       Run as:
#                python src/transferable_samplers/eval.py \
#                experiment=transferable/eval/prose_up_to_8aa_mala.yaml
#              Defaults to the model:
#                https://huggingface.co/transferable-samplers/model-weights/tree/main/transferable/prose_up_to_8aa.pth
#              The previously MALA implementation required 2x energy_and_grad calls per timestep,
#              hence only uses 10_000 particles and 50 annealing steps (instead of 100 with ULA).
#              The implementation has been updated but this config is retained to match the paper.
# ──────────────────────────────────────────────────────────────
defaults:
  - override /model: normalizing_flow
  - override /model/net: prose
  - override /data: transferable/up_to_8aa
  - override /trainer: gpu
hf_state_dict_path: transferable/prose_up_to_8aa.pth
model:
  source_energy_config:
    sample_batch_size: 2_500
    energy_batch_size: 2_500
    grad_batch_size: 2_500
    use_com_adjustment: true
callbacks:
  sampling_evaluation:
    sampler:
      _target_: src.samplers.smc_sampler.SMCSampler
      num_samples: 10_000
      use_metropolis: true
      init_eps: 5e-4
      num_annealing_steps: 50
      ess_threshold: 1.0
      adaptive_step_size: true
      resampling_method: systematic
      energy_cutoff_filter: 100
      logw_quantile_filter: 0.002
      log_traj_freq: 1
