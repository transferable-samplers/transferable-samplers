# @package _global_
# ──────────────────────────────────────────────────────────────
# Description: Self-improve SNIS Prose on ManyPeptidesMD
# Reference:   Table 4, Amortized Sampling with Transferable Normalizing Flows
#              https://arxiv.org/abs/2508.18175
# Notes:       Run as:
#                python src/transferable_samplers/eval.py \
#                experiment=transferable/eval/prose_up_to_8aa_self_improve.yaml
#              Defaults to the model:
#                https://huggingface.co/transferable-samplers/model-weights/tree/main/transferable/prose_up_to_8aa.pth
# ──────────────────────────────────────────────────────────────
defaults:
  - override /model: normalizing_flow
  - override /model/net: prose
  - override /data: transferable/up_to_8aa
  - override /trainer: gpu
init_hf_state_dict_path: transferable/prose_up_to_8aa.pth
model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 5.e-6
    betas: [0.9, 0.95]
    weight_decay: 4e-4
  scheduler:
    _target_: torch.optim.lr_scheduler.OneCycleLR
    _partial_: true
    max_lr: ${model.optimizer.lr}
    total_steps: ${trainer.max_epochs}
    pct_start: 0.05
    anneal_strategy: cos
    cycle_momentum: false
    div_factor: 5e2
    final_div_factor: 1.0
  source_energy_config:
    sample_batch_size: 2_500
    energy_batch_size: 2_500
    grad_batch_size: 2_500
    use_com_adjustment: true
  teacher_regularize_weight: 0.5
  train_from_buffer: true
data:
  batch_size: 32
  train_from_buffer: true
callbacks:
  ema:
  populate_buffer:
    _target_: src.callbacks.populate_buffer_callback.PopulateBufferCallback
    sampler:
      _target_: src.samplers.snis_sampler.SNISSampler
      num_samples: 200_000
      logw_quantile_filter: 0.002
  sampling_evaluation:
    sampler:
      _target_: src.samplers.snis_sampler.SNISSampler
      num_samples: 10_000
      logw_quantile_filter: 0.002
trainer:
  limit_train_batches: 1000
  accumulate_grad_batches: 8
  max_epochs: 4
