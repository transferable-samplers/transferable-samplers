---
_target_: src.models.flow_matching_module.FlowMatchingModule
compile_net: false
output_dir: ${paths.output_dir}
train_from_buffer: false
mean_free_prior: true
atol: 1e-4
rtol: 1e-4
dlogp_tol_scale: 1.0
prior:
  _target_: src.models.priors.normal_distribution.NormalDistribution
  num_dimensions: ${data.num_dimensions}
  mean_free: true
sigma: 0.0
source_energy_config:
  _target_: src.utils.dataclasses.SourceEnergyConfig
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
