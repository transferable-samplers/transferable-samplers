# @package _global_
#
defaults:
  - override /hydra/launcher: submitit_slurm
hydra:
  launcher:
    partition: long
    cpus_per_task: 4
    mem_gb: 48
    gres: gpu:l40s:1
    timeout_min: 1440
    array_parallelism: 100 # max num of tasks to run in parallel (via job array)
    setup:
      - module purge
      - source .venv/bin/activate
